<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硫氢化钠 - 行舟梦将至，采撷繁星愁</title>
    <!-- 网页标签图标 (Favicon) - 极简几何帆船与明显的弯月 (高空悬挂) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230f172a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2 20 L22 20'/%3E%3Cpath d='M5 20 C5 20, 8 23, 14 23 C17 23, 19 20, 19 20'/%3E%3Cpath d='M9 20 L9 9'/%3E%3Cpath d='M9 9 L17 15 L9 17'/%3E%3Cpath d='M10 2 A 4 4 0 0 0 5 5 A 5 5 0 0 1 10 2'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper page-transition">
        <!-- 侧边栏：极简人物卡片 -->
        <aside class="sidebar">
            <div class="profile">
                <img src="assets/avatar.jpg" alt="硫氢化钠" class="avatar" onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'">
                <h1 class="author-name">硫氢化钠</h1>
                <p class="author-bio">记录学习点滴，分享开源日常。关注技术，也热爱生活。</p>
                <div class="social-links" style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="https://github.com/NaHS2" target="_blank" style="display: flex; align-items: center; gap: 6px; color: var(--gray-600); text-decoration: none; transition: color 0.2s;">
                        <!-- Feather Icon: GitHub -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                        @NaHS2
                    </a>
                    <a href="https://space.bilibili.com/549713964?spm_id_from=333.1007.0.0" target="_blank" style="display: flex; align-items: center; gap: 6px; color: var(--gray-600); text-decoration: none; transition: color 0.2s;">
                        <!-- Custom Icon: Bilibili TV outline -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="15" rx="4" ry="4"></rect>
                            <polyline points="8 3 12 7 16 3"></polyline>
                            <line x1="8" y1="12" x2="8" y2="12"></line>
                            <line x1="16" y1="12" x2="16" y2="12"></line>
                        </svg>
                        Bilibili
                    </a>
                    <a href="downloads.html" style="display: flex; align-items: center; gap: 6px; color: var(--gray-600); text-decoration: none; transition: color 0.2s;">
                        <!-- Feather Icon: Download / Archive -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        资料下载
                    </a>
                </div>
            </div>
        </aside>

        <!-- 主内容区：排版干净的列表 -->
        <main class="main-content">
            <div class="nav-tabs">
                <button class="tab-btn active" data-category="all">全部文章</button>
                <button class="tab-btn" data-category="tech">技术教程</button>
                <button class="tab-btn" data-category="life">生活随笔</button>
            </div>
            
            <div id="post-list" class="post-list">
                <p style="color: var(--gray-400);">数据加载中...</p>
            </div>
            
            <footer class="footer">
                <p>&copy; 2026 硫氢化钠. Crafted with focus.</p>
            </footer>
        </main>
    </div>

    <script>
        let allPosts = [];

        // 使用时间戳防止浏览器缓存 posts.json 导致无法看到最新更新
        fetch('posts.json?t=' + new Date().getTime())
            .then(response => response.json())
            .then(posts => {
                allPosts = posts;
                renderPosts('all'); // 默认显示全部文章
            })
            .catch(error => {
                document.getElementById('post-list').innerHTML = '<p style="color: red;">加载失败，请检查网络或配置。</p>';
                console.error('Error loading posts:', error);
            });

        // 渲染文章列表
        function renderPosts(category) {
            const postList = document.getElementById('post-list');
            postList.innerHTML = ''; 
            
            // 根据分类过滤文章
            let filteredPosts = allPosts;
            if (category === 'tech') {
                // 定义属于“技术”的标签关键词
                const techTags = ['技术', '嵌入式', '物联网', '开发', '工具', '开源', '代码'];
                filteredPosts = allPosts.filter(p => p.tags && p.tags.some(t => techTags.some(keyword => t.includes(keyword))));
            } else if (category === 'life') {
                // 定义属于“生活”的标签关键词
                const lifeTags = ['生活', '随笔', '随想', '校园', '感悟'];
                filteredPosts = allPosts.filter(p => p.tags && p.tags.some(t => lifeTags.some(keyword => t.includes(keyword))));
            }

            if (filteredPosts.length === 0) {
                postList.innerHTML = '<p style="color: var(--gray-400);">该分类下暂无文章</p>';
                return;
            }

            // 辅助函数：创建卡片 DOM 元素
            const createPostCard = (post, delayIndex) => {
                const a = document.createElement('a');
                a.href = `post.html?id=${post.id}`;
                a.className = 'post-item';
                a.style.animation = `fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards ${delayIndex * 0.1}s`;
                
                let tagsHtml = '';
                if (post.tags && post.tags.length > 0) {
                    tagsHtml = `<div class="tags">` + 
                        post.tags.map(tag => `<span class="tag">${tag}</span>`).join('') + 
                        `</div>`;
                }
                
                const readTimeHtml = post.readTime ? `<span class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${post.readTime}</span>` : '';

                a.innerHTML = `
                    <h3 class="post-title">${post.title}</h3>
                    <p class="post-excerpt">${post.excerpt}</p>
                    <div class="post-meta">
                        <span class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${post.date}</span>
                        ${readTimeHtml}
                        ${tagsHtml}
                    </div>
                `;
                return a;
            };

            // 技术分类下显示合集，其他分类平铺
            if (category === 'tech') {
                const collections = {};
                const others = [];

                filteredPosts.forEach(post => {
                    if (post.collection) {
                        if (!collections[post.collection]) collections[post.collection] = [];
                        collections[post.collection].push(post);
                    } else {
                        others.push(post);
                    }
                });

                let delayIndex = 0;

                // 渲染合集
                for (const [collName, collPosts] of Object.entries(collections)) {
                    const header = document.createElement('div');
                    header.className = 'collection-header';
                    header.innerHTML = `
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        合集：${collName}
                    `;
                    header.style.animation = `fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards ${delayIndex * 0.1}s`;
                    postList.appendChild(header);
                    delayIndex++;

                    const collList = document.createElement('div');
                    collList.className = 'collection-list';
                    collPosts.forEach(post => {
                        collList.appendChild(createPostCard(post, delayIndex++));
                    });
                    postList.appendChild(collList);
                }

                // 渲染单篇技术文章
                if (others.length > 0) {
                    if (Object.keys(collections).length > 0) {
                        const header = document.createElement('div');
                        header.className = 'collection-header';
                        header.innerHTML = `
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                            单篇教程
                        `;
                        header.style.animation = `fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards ${delayIndex * 0.1}s`;
                        postList.appendChild(header);
                        delayIndex++;
                    }
                    
                    const collList = document.createElement('div');
                    collList.className = 'collection-list';
                    others.forEach(post => {
                        collList.appendChild(createPostCard(post, delayIndex++));
                    });
                    postList.appendChild(collList);
                }

            } else {
                // 全部/生活分类正常平铺渲染
                filteredPosts.forEach((post, index) => {
                    postList.appendChild(createPostCard(post, index));
                });
            }
        }

        // 标签切换逻辑
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 移除所有高亮状态，并给当前点击的标签加上 active
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const category = e.target.getAttribute('data-category');
                renderPosts(category);
            });
        });
    </script>
</body>
</html>
