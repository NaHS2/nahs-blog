<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硫氢化钠 - 行舟梦将至，采撷繁星愁</title>
    <!-- 网页标签图标 (Favicon) - 极简几何帆船与明显的弯月 (高空悬挂) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230f172a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2 20 L22 20'/%3E%3Cpath d='M5 20 C5 20, 8 23, 14 23 C17 23, 19 20, 19 20'/%3E%3Cpath d='M9 20 L9 9'/%3E%3Cpath d='M9 9 L17 15 L9 17'/%3E%3Cpath d='M10 2 A 4 4 0 0 0 5 5 A 5 5 0 0 1 10 2'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper page-transition">
        <!-- 侧边栏：极简人物卡片 -->
        <aside class="sidebar">
            <div class="profile">
                <img src="assets/avatar.jpg" alt="硫氢化钠" class="avatar" onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'">
                <h1 class="author-name">硫氢化钠</h1>
                <p class="author-bio">记录学习点滴，分享开源日常。关注技术，也热爱生活。</p>
                <div class="social-links" style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="https://github.com/NaHS2" target="_blank" style="display: flex; align-items: center; gap: 6px; color: var(--gray-600); text-decoration: none; transition: color 0.2s;">
                        <!-- Feather Icon: GitHub -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                        @NaHS2
                    </a>
                    <a href="https://space.bilibili.com/549713964?spm_id_from=333.1007.0.0" target="_blank" style="display: flex; align-items: center; gap: 6px; color: var(--gray-600); text-decoration: none; transition: color 0.2s;">
                        <!-- Custom Icon: Bilibili TV outline -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="7" width="20" height="15" rx="4" ry="4"></rect>
                            <polyline points="8 3 12 7 16 3"></polyline>
                            <line x1="8" y1="12" x2="8" y2="12"></line>
                            <line x1="16" y1="12" x2="16" y2="12"></line>
                        </svg>
                        Bilibili
                    </a>
                </div>
            </div>
        </aside>

        <!-- 主内容区：排版干净的列表 -->
        <main class="main-content">
            <h2 class="section-title">最新文章</h2>
            
            <div id="post-list" class="post-list">
                <p style="color: var(--gray-400);">数据加载中...</p>
            </div>
            
            <footer class="footer">
                <p>&copy; 2026 硫氢化钠. Crafted with focus.</p>
            </footer>
        </main>
    </div>

    <script>
        fetch('posts.json')
            .then(response => response.json())
            .then(posts => {
                const postList = document.getElementById('post-list');
                postList.innerHTML = ''; 
                
                posts.forEach((post, index) => {
                    // 整块卡片作为一个 <a> 标签包裹，点击体验更好
                    const a = document.createElement('a');
                    a.href = `post.html?id=${post.id}`;
                    a.className = 'post-item';
                    
                    // 页面切换逻辑：为每个卡片添加交错的加载动画延迟
                    a.style.animation = `fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards ${index * 0.1}s`;
                    
                    let tagsHtml = '';
                    if (post.tags && post.tags.length > 0) {
                        tagsHtml = `<div class="tags">` + 
                            post.tags.map(tag => `<span class="tag">${tag}</span>`).join('') + 
                            `</div>`;
                    }
                    
                    // Feather Icons for metadata
                    const readTimeHtml = post.readTime ? `<span class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${post.readTime}</span>` : '';

                    a.innerHTML = `
                        <h3 class="post-title">${post.title}</h3>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <div class="post-meta">
                            <span class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${post.date}</span>
                            ${readTimeHtml}
                            ${tagsHtml}
                        </div>
                    `;
                    postList.appendChild(a);
                });
            })
            .catch(error => {
                document.getElementById('post-list').innerHTML = '<p style="color: red;">加载失败，请检查网络或配置。</p>';
                console.error('Error loading posts:', error);
            });
    </script>
</body>
</html>
