<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硫氢化钠的博客 - 学习与开源分享</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 左侧：个人信息侧边栏 -->
        <aside class="sidebar">
            <div class="profile-card">
                <img src="assets/avatar.jpg" alt="硫氢化钠" class="avatar" onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'">
                <h1 class="author-name">硫氢化钠</h1>
                <p class="author-bio">记录学习点滴，分享开源日常。关注技术，也热爱生活。</p>
                <div class="social-links">
                    <a href="https://github.com/NaHS2" target="_blank">
                        <!-- GitHub Icon -->
                        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
                        </svg>
                        @NaHS2
                    </a>
                </div>
            </div>
        </aside>

        <!-- 右侧：文章列表 -->
        <main class="main-content">
            <h2 class="section-title">最新文章</h2>
            <ul id="post-list" class="post-list">
                <p style="text-align: center; color: var(--text-muted);">数据加载中...</p>
            </ul>
            
            <footer class="footer">
                <p>&copy; 2026 硫氢化钠 | Code & Life</p>
            </footer>
        </main>
    </div>

    <script>
        fetch('posts.json')
            .then(response => response.json())
            .then(posts => {
                const postList = document.getElementById('post-list');
                postList.innerHTML = ''; 
                
                posts.forEach(post => {
                    const li = document.createElement('li');
                    li.className = 'post-item';
                    
                    // 生成标签 HTML
                    let tagsHtml = '';
                    if (post.tags && post.tags.length > 0) {
                        tagsHtml = `<div class="tags">` + 
                            post.tags.map(tag => `<span class="tag">${tag}</span>`).join('') + 
                            `</div>`;
                    }
                    
                    // 阅读时间
                    const readTimeHtml = post.readTime ? `<span class="meta-item">⏱️ ${post.readTime}</span>` : '';

                    li.innerHTML = `
                        <h3 class="post-title"><a href="post.html?id=${post.id}">${post.title}</a></h3>
                        <div class="post-meta">
                            <span class="meta-item">📅 ${post.date}</span>
                            ${readTimeHtml}
                            ${tagsHtml}
                        </div>
                        <p class="post-excerpt">${post.excerpt}</p>
                    `;
                    postList.appendChild(li);
                });
            })
            .catch(error => {
                document.getElementById('post-list').innerHTML = '<p style="text-align: center; color: red;">加载文章列表失败，请检查网络或配置。</p>';
                console.error('Error loading posts:', error);
            });
    </script>
</body>
</html>
