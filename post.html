<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 硫氢化钠</title>
    <!-- 网页标签图标 (Favicon) - 极简几何帆船与明显的弯月 (高空悬挂) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230f172a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2 20 L22 20'/%3E%3Cpath d='M5 20 C5 20, 8 23, 14 23 C17 23, 19 20, 19 20'/%3E%3Cpath d='M9 20 L9 9'/%3E%3Cpath d='M9 9 L17 15 L9 17'/%3E%3Cpath d='M10 2 A 4 4 0 0 0 5 5 A 5 5 0 0 1 10 2'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="post-page">
    <!-- 顶部横向进度条：月下行舟 -->
    <header class="scroll-header">
        <div class="scroll-track-horizontal">
            <!-- 破晓之月 -->
            <svg class="scroll-moon-horizontal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            
            <!-- 水波涟漪 (江面) -->
            <div class="scroll-water"></div>

            <!-- 孤舟 SVG (随滚动横向移动) -->
            <svg id="scroll-boat" class="scroll-boat-horizontal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 18 L22 18"/>
                <path d="M5 18 C5 18, 8 22, 14 22 C17 22, 19 18, 19 18"/>
                <path d="M9 18 L9 6"/>
                <path d="M9 6 L17 12 L9 14"/>
            </svg>
        </div>
    </header>

    <!-- 文章页不再使用两栏布局，而是居中单栏 -->
    <div class="app-wrapper page-transition" style="display: block; max-width: 900px; margin: 0 auto; position: relative;">

        <main class="main-content" style="max-width: 100%; margin: 0 auto;">
            <!-- 顶部：返回按钮与 Logo 品牌区 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <a href="index.html" class="back-btn" style="margin-bottom: 0;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    返回列表
                </a>
            </div>
            
            <article class="article-header">
                <h1 id="post-title">加载中...</h1>
                <div class="post-meta" id="post-meta">
                    <!-- 动态插入 -->
                </div>
            </article>

            <div id="content" class="markdown-body">
                <p style="color: var(--gray-400);">文章解析中...</p>
            </div>
            
            <footer class="footer">
                <p>&copy; 2026 硫氢化钠. Crafted with focus.</p>
            </footer>
        </main>
    </div>

    <script>
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (postId) {
            fetch('posts.json')
                .then(res => res.json())
                .then(posts => {
                    const currentPost = posts.find(p => p.id === postId);
                    if (currentPost) {
                        document.title = `${currentPost.title} - 硫氢化钠`;
                        document.getElementById('post-title').innerText = currentPost.title;
                        
                        let tagsHtml = '';
                        if (currentPost.tags && currentPost.tags.length > 0) {
                            tagsHtml = `<div class="tags">` + 
                                currentPost.tags.map(tag => `<span class="tag">${tag}</span>`).join('') + 
                                `</div>`;
                        }
                        const readTimeHtml = currentPost.readTime ? `<span class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> ${currentPost.readTime}</span>` : '';
                        
                        document.getElementById('post-meta').innerHTML = `
                            <span class="meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${currentPost.date}</span>
                            ${readTimeHtml}
                            ${tagsHtml}
                        `;
                    }
                });

            fetch(`posts/${postId}.md`)
                .then(response => {
                    if (!response.ok) throw new Error('文章未找到');
                    return response.text();
                })
                .then(text => {
                    const lines = text.split('\n');
                    if(lines[0].startsWith('# ')) {
                        lines.shift();
                    }
                    document.getElementById('content').innerHTML = marked.parse(lines.join('\n'));

                    // 初始化侧边小舟滚动逻辑
                    initScrollBoat();
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = `<p>找不到对应的文章内容，或网络加载失败。</p>`;
                    console.error('Error loading post:', error);
                });
            
        } else {
            document.getElementById('content').innerHTML = '<p>未提供文章 ID</p>';
        }

        // 顶部横向小舟滚动进度指示器逻辑
        function initScrollBoat() {
            const boat = document.getElementById('scroll-boat');
            if (!boat) return;

            window.addEventListener('scroll', () => {
                // 计算当前滚动的百分比
                const scrollTop = window.scrollY;
                const docHeight = document.body.scrollHeight - window.innerHeight;
                
                if (docHeight <= 0) return; // 页面不够滚动
                
                // 限制在 0% ~ 100% 之间
                let scrollPercent = (scrollTop / docHeight) * 100;
                scrollPercent = Math.max(0, Math.min(100, scrollPercent));
                
                // 随着滚动，改变小舟的 left 位置 (横向滑动)
                boat.style.left = `${scrollPercent}%`;
            });
        }
    </script>
</body>
</html>
